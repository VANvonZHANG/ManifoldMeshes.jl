name: Downgrade
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: downgrade ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - name: Downgrade to minimum compatible versions
        run: |
          julia --project -e '
          using Pkg
          Pkg.update()
          Pkg.rm("ManifoldMeshes")
          Pkg.develop(PackageSpec(path="."; io=devnull))
          Pkg.compat()
          '
      - uses: julia-actions/julia-runtest@v1
